name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'          # git tag v1.0.0 触发
  workflow_dispatch:   # 也可手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Python backend ────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        working-directory: SimpleClaw
        run: uv pip install -r requirements.txt pyinstaller --system

      - name: Build flowcut_server.exe with PyInstaller
        working-directory: SimpleClaw
        run: pyinstaller flowcut_server.spec --distpath ../backend-dist --workpath /tmp/pyinstaller-build --clean

      # ── Electron frontend ─────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Download ffmpeg for Windows
        working-directory: flowcut_frontend
        run: |
          curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o ffmpeg.zip
          unzip -j ffmpeg.zip "*/bin/ffmpeg.exe" -d .
          Remove-Item ffmpeg.zip
        shell: pwsh

      - name: Install frontend dependencies
        working-directory: flowcut_frontend
        run: pnpm install

      - name: Build frontend + Electron installer
        working-directory: flowcut_frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run electron:build

      # ── 上传产物 ──────────────────────────────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlowCut-Windows-Installer
          path: flowcut_frontend/release/*.exe
          retention-days: 30

      # 如果是 tag 触发，自动创建 GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: flowcut_frontend/release/*.exe
          generate_release_notes: true
