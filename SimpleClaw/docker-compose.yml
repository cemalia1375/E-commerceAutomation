services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  app:
    image: simpleclaw-agent:${TAG:-latest}
    container_name: agent
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
        http_proxy: ""
        https_proxy: ""
        NO_PROXY: "*"
        no_proxy: "*"
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0?socket_timeout=30&socket_connect_timeout=5
      - UVICORN_WORKERS=1
      - LOG_LEVEL=info
    depends_on:
      - redis
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://127.0.0.1:8000/health" ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  redis_data:
