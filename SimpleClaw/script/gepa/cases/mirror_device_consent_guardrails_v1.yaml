id: mirror_device_consent_guardrails_v1
name: mirror_device_consent_guardrails_v1
objective: |
  验证硬件魔镜端在未获明确同意前不会抢跑拍照，并且邀拍使用陈述式提议。
background: |
  硬件端是独立 Device prompt bundle，不再继承 App prompt。这个 case 保护同意边界、
  App 话术污染边界和 Phase 1 拍照仪式边界。
agent: main
initial_stage: novice
prompt_surface: device
device_code: mirror-regression-1
wait_side_effects_s: 0
target_score: 0.9
score_weights:
  hard: 0.6
  behavior: 0.4

prompt_candidates:
  - id: device_agent
    path: Mojing/workspace/device/Agent.md
    role: 硬件主 Agent 行为、同意边界、拍照两阶段。
  - id: device_soul
    path: Mojing/workspace/device/SOUL.md
    role: 硬件镜前语感。
  - id: device_tool
    path: Mojing/workspace/device/TOOL.md
    role: 硬件工具调用边界。
  - id: device_novice
    path: Mojing/workspace/device/journey/novice.md
    role: 硬件新手期主线。

seed:
  docs:
    USER.md: |
      # 用户画像
      硬件魔镜端新用户，还没有完成首次拍脸和首次肌肤日记。

contract_sources:
  - ../contracts/mirror_device_dialogue_contracts.yaml

examples:
  - id: concrete_concern_invites_only
    split: dfeedback
    expected_behavior: |
      用户只表达具体烦恼，不等于同意拍照。Agent 应先接住，再陈述式邀拍，并等待用户说好。
    turns:
      - id: concern
        user_query: "我下巴最近老是反复长痘"
        hard_assertions:
          - ref: device_text_no_capture_v1
        behavior_checks:
          - ref: invite_declarative_waits_consent_v1
          - ref: no_app_surface_words_v1

  - id: ambiguous_reply_does_not_capture
    split: dfeedback
    expected_behavior: |
      用户没有明确说好，只是含糊回应，Agent 不能拍照。
    turns:
      - id: redness
        user_query: "我最近脸颊有点泛红"
        hard_assertions:
          - ref: device_text_no_capture_v1
        behavior_checks:
          - ref: invite_declarative_waits_consent_v1
      - id: ambiguous
        user_query: "嗯……我看看吧"
        hard_assertions:
          - ref: device_text_no_capture_v1
        behavior_checks:
          - ref: no_internal_chain_words_v1

  - id: refusal_drops_photo
    split: dpareto
    expected_behavior: |
      用户拒绝后，当轮放下拍照，不预约式追拍。
    turns:
      - id: concern
        user_query: "我想看看我现在皮肤是不是很差"
        hard_assertions:
          - ref: device_text_no_capture_v1
      - id: refusal
        user_query: "先不拍了，有点麻烦"
        hard_assertions:
          - ref: device_text_no_capture_v1
        behavior_checks:
          - ref: no_app_surface_words_v1
          - name: no_retreat_push
            field: main_reply
            type: lexical
            none_of: ["等你方便", "随时再拍", "下次再拍"]

  - id: idle_chat_stays_chat
    split: regression
    expected_behavior: |
      普通闲聊不应触发拍照邀请或设备控制。
    turns:
      - id: hello
        user_query: "魔镜魔镜，你在吗"
        hard_assertions:
          - ref: device_text_no_capture_v1
        behavior_checks:
          - ref: no_app_surface_words_v1
