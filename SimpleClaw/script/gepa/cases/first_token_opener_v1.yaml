id: first_token_opener_v1
name: first_token_opener_v1_multi_turn_contextual_openers
objective: |
  专门测试 first_token_llm 的多轮首气泡质量。

  目标不是让 first token 抢主 Agent 的判断、建议或工具动作，
  而是让它从“嗯嗯/哦哦/收到啦”这类低信息占位，升级为“上下文短开场”：
  短、轻、闭合、不承诺、不判断，但能接住当前轮和近期历史。

  本 case 只评价 first_token_reply，不评价主 Agent 正文好坏。
  每个 example 都是连续多轮对话，用来测试 first token 是否能沿着 history 逐轮承接，
  而不是把每一轮都当成孤立单句。
background: |
  当前 first_token.md 明确写着“极短弱接话器”和默认“嗯嗯/收到啦/知道啦”，
  但代码已经给 first_token_llm 注入近期共享对话历史。
  因此这次测试的核心问题是：
  history context 已经存在时，首气泡是否能承接上下文，而不是停留在浅层占位。

  另一个观察点是换行协议：
  first token 本身不应该输出字面量 /n、\n 或 \n\n。
  如果 baseline 中仍出现“我了/n解了”一类内容，先用本 case 记录问题，
  再单独判断来源是 prompt、SSE 流式拼接还是前端渲染。
agent: main
initial_stage: novice
wait_side_effects_s: 1
target_score: 0.98
score_weights:
  hard: 0.4
  behavior: 0.6

prompt_candidates:
  - id: first_token_opener
    path: Mojing/workspace/first_token.md
    role: |
      主 Agent 正式回复前的 first_token_llm 短开场。
      只负责上下文承接，不承诺动作、不做判断、不输出建议正文。

seed:
  docs:
    USER.md: |
      # 用户画像
      用户仍处于新手期，刚开始和 Agent 熟悉起来。
      用户刚刚/近期有过一次轻量皮肤观察，但还没有进入探索期，也没有稳定长期画像。

      ## Recent Skin Observation
      - 当前可参考的轻量线索：T 区和下巴偏容易出油，下巴偶尔冒痘，脸颊偶尔泛红。
      - 用户不喜欢被强推流程，希望回复自然一点。

      ## Recent Product Mentions
      - 用户最近提到过防晒：安热沙小金瓶。
      - 用户最近提到过修护产品：理肤泉 B5 修复霜。

contract_sources:
  - ../contracts/first_token_opener_contracts.yaml

examples:
  - id: emotion_to_self_care_chain
