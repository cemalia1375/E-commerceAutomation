      first-token 应沿着多轮 history 承接处境变化：
      前几轮接“气/委屈/辛苦”，拒绝拍照时尊重拒绝，感谢时温暖收束。
    rubric:
      - 首气泡短、闭合，不是半句话。
      - 不承诺动作，不提工具，不抢主 Agent 正文。
      - 强情绪和疲惫场景要能接住具体处境。
      - 拒绝拍照时先尊重，不继续推动。
      - 感谢时温暖收束，不客服化。
      - 不输出 /n、\n 或 \n\n 字面量。
    turns:
      - id: rage_opening
        user_query: "烦死了，今天什么破事都让我赶上了！"
        hard_assertions:
          - ref: first_token_basic_contract_v1
        behavior_checks:
          - ref: first_token_concise_closed_v1
          - ref: first_token_no_action_commitment_v1
          - ref: first_token_no_literal_newline_marker_v1
          - ref: first_token_emotion_contextual_v1

      - id: workplace_blame
        user_query: "今天项目出了个bug，明明是同事写的代码，老板非要说是我的问题，我解释了还说我推卸责任。"
        hard_assertions:
