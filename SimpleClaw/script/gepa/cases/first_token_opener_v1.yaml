        behavior_checks:
          - ref: first_token_concise_closed_v1
          - ref: first_token_avoid_generic_placeholder_v1
          - ref: first_token_no_action_commitment_v1
          - ref: first_token_no_literal_newline_marker_v1
          - ref: first_token_emotion_contextual_v1

