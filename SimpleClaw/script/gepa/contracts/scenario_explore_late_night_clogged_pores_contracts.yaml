hard_assertion_library:
  explore_text_reply_no_background_task_v1:
    - reply_non_empty: true
    - main_reply_non_empty: true
    - no_runtime_task_created: image_analysis
    - no_runtime_task_created: skin_diary_generation
    - no_runtime_task_created: deep_research
    - no_runtime_task_created: subagent_dispatch

  explore_direct_reply_no_skill_handoff_v1:
    - not_tool_called: load_skill
    - not_tool_called: notify_skin_diary_chat
    - not_tool_called: deep_report_chat

check_library:
  explore_current_problem_first_v1:
    field: main_reply
    type: semantic
    any_of: ["闭口", "额头", "T区", "出油", "熬夜", "赶项目", "皮肤"]
    guidance: >
      探索期用户带着当前肤况问题来时，回复必须先接住眼前问题，
      不要直接跳去报告、日记或历史复盘。
    prompt_fix_hint: >
      explore.md 中强调：历史和工具只能辅助当前问题，不能替代当前问题的回答。
    positive_example: "熬夜后额头闭口和T区出油一起冒出来，确实会很烦，我们先把今晚这波稳住。"
    negative_example: "我来帮你生成深度报告。"
    weight: 1.3

  explore_light_history_use_v1:
    field: main_reply
    type: semantic
    any_of: ["上次", "之前", "记录", "轻度闭口", "额头", "T区", "按你之前"]
    guidance: >
      探索期可以轻轻使用历史信息，例如上次额头轻度闭口、T区易出油，
      但只补一小句相关依据，不要像报告一样大段复述画像。
    prompt_fix_hint: >
      用“我记得/按之前记录”轻轻带一下历史，再回到当前建议；不要搬运整份画像。
    positive_example: "我记得你之前额头就有点轻度闭口，这次又熬夜，先别猛上功效。"
    negative_example: "根据你的历史画像、肌肤报告和长期记录综合分析如下。"
    weight: 1.2

  explore_asks_sleep_detail_v1:
    field: main_reply
    type: semantic
    any_of: ["几点", "睡", "熬到", "一两点", "三点", "作息", "连续"]
    guidance: >
      用户说熬夜赶项目后爆闭口，回复应追问或承接熬夜时长/连续几天，
      这样后续建议才像真的在陪她看变化。
    prompt_fix_hint: >
      不要只给通用控油建议；先问最近熬到几点、连续几天或压力情况。
    positive_example: "这几天大概熬到几点？如果连续一两点后睡，额头闭口确实更容易冒出来。"
    negative_example: "你用水杨酸就可以了。"
    weight: 1.1

  explore_explain_late_sleep_oil_link_v1:
    field: main_reply
    type: semantic
    any_of: ["皮脂", "油脂", "出油", "炎症", "屏障", "熬夜", "作息", "更不稳定"]
    none_of: ["一定是", "必然", "主要原因", "专业诊断", "保证"]
    guidance: >
      用户确认熬到一两点甚至三点后，回复应谨慎解释熬夜和出油、闭口、炎症不稳定的可能关系，
      不做确定诊断。
    prompt_fix_hint: >
      用“容易/可能/会让状态更不稳定”，不要把熬夜说成唯一原因。
    positive_example: "连续熬到一两点，皮脂和炎症状态都容易不稳，所以T区出油和额头闭口可能一起加重。"
    negative_example: "这就是熬夜导致的，主要原因已经确定。"
    weight: 1.3

  explore_current_selfie_invite_low_pressure_v1:
    field: main_reply
    type: semantic
    any_of: ["现在", "当前", "今天", "拍", "自拍", "照片", "清晰", "不方便也没关系"]
    guidance: >
      探索期用户说今天肤况明显变化时，可以低压建议补一张当前清晰自拍，
      但要保留选择权，不要催拍或把拍照说成唯一入口。
    prompt_fix_hint: >
      用户说“今天起来闭口/出油变化”时，可以说补当前自拍会更准；但接受用户不拍。
    positive_example: "如果方便，补一张今天的清晰正脸照我能看得更准；不想拍的话，我先按你说的情况给你稳住今晚。"
    negative_example: "必须先拍照，不然我没法判断。"
    weight: 1.1

  explore_no_repeated_photo_invite_v1:
    field: main_reply
    type: lexical
    none_of: ["再拍一张", "再发一张", "再上传一张", "重新拍一张", "现在再拍"]
    guidance: >
      如果前一两轮已经低压建议过当前自拍，后续用户继续问今晚怎么护肤、产品能不能用时，
      不要反复邀图，应先基于文本和历史继续给建议。
    prompt_fix_hint: >
      把重复邀图改成直接给今晚步骤、产品取舍或观察节奏。
    weight: 1.1

  explore_uses_known_cabinet_products_v1:
    field: main_reply
    type: semantic
    any_of: ["水杨酸", "神经酰胺", "烟酰胺", "护肤柜", "面霜", "精华", "T区", "两颊"]
    guidance: >
      探索期已有护肤柜信息时，用户问今晚怎么护肤或某瓶精华能不能用，
      回复应自然使用已知产品做取舍，而不是只给通用清洁保湿防晒。
    prompt_fix_hint: >
      explore.md 中强调：已知护肤柜产品只在相关时轻用，给区域和频率边界。
    positive_example: "今晚水杨酸先只放额头和鼻子，神经酰胺面霜薄涂两颊，烟酰胺先别叠太多。"
    negative_example: "你先做好基础护肤就行。"
    weight: 1.3

  explore_product_boundary_for_breakout_v1:
    field: main_reply
    type: semantic
    any_of: ["先别", "暂停", "避开", "局部", "T区", "两颊", "额头", "薄涂", "不要叠"]
    none_of: ["烟酰胺可以治疗闭口", "水杨酸多涂一点", "用量比平时多一点", "保证会好"]
    guidance: >
      用户问护肤柜里的烟酰胺/水杨酸/面霜今天能不能用时，
      要给区域化边界和克制用法；不要鼓励加量，不要把产品药品化。
    prompt_fix_hint: >
      出油闭口当天重点是少叠加、分区、稳住屏障；不是“功效越多越好”。
    positive_example: "烟酰胺今天可以先不叠，水杨酸只局部薄涂额头和鼻子，两颊用神经酰胺稳住。"
    negative_example: "水杨酸用量比平时多一点，闭口很快就好。"
    weight: 1.3

  explore_no_tool_sacralization_v1:
    field: main_reply
    type: lexical
    none_of:
      - "专属步骤"
      - "精准定制"
      - "全面分析"
      - "彻底解决"
      - "保证改善"
      - "必须生成"
      - "马上生成"
      - "深度报告"
      - "深度分析报告"
    guidance: >
      探索期可以使用肌肤日记、护肤柜和深度报告，但不能把工具神圣化；
      普通咨询先直接答，深度报告不要作为默认收尾。
    prompt_fix_hint: >
      工具是辅助记录和规划，不是每轮聊天的终点；普通问题先直接回答。
    weight: 1.2

  explore_diary_mention_only_when_relevant_v1:
    field: main_reply
    type: semantic
    guidance: >
      用户问“今天怎么护肤/今晚按什么步骤”时，可以轻提肌肤日记或今日安排；
      但如果只是问某瓶产品能不能用，先直接回答产品边界，不要把问题外包给日记助手。
    prompt_fix_hint: >
      肌肤日记可以作为“记录和复盘”的辅助，但主会话必须先给出当前轮能执行的建议。
    positive_example: "今晚先这样用：T区薄涂水杨酸，两颊神经酰胺保湿；如果你要更新今天日记，我也可以等照片结果回来后帮你同步。"
    negative_example: "这个去肌肤日记页面看就好。"
    weight: 1.1

behavior_contracts:
  explore_late_night_entry_v1:
    description: 探索期用户熬夜后出油和闭口突然变多的入口回复。
    editable_components: [main_agent, tool_rules, explore_journey, soul_style]
    expected_behavior: >
      先接住当前额头闭口和T区出油，再轻轻使用历史记录作为依据，
      追问熬夜细节或低压建议补当前自拍；不直接推深度报告。
    hard_assertions:
      - ref: explore_text_reply_no_background_task_v1
      - ref: explore_direct_reply_no_skill_handoff_v1
    checks:
      - ref: explore_current_problem_first_v1
      - ref: explore_light_history_use_v1
      - ref: explore_asks_sleep_detail_v1
      - ref: explore_current_selfie_invite_low_pressure_v1
      - ref: explore_no_tool_sacralization_v1

  explore_late_sleep_explanation_v1:
    description: 用户补充连续一两点后睡，解释作息和肤况波动。
    editable_components: [main_agent, explore_journey, soul_style]
    expected_behavior: >
      解释熬夜可能让出油、闭口和炎症更不稳定，给低成本急救方向；
      不武断诊断，不重复催拍。
    hard_assertions:
      - ref: explore_text_reply_no_background_task_v1
      - ref: explore_direct_reply_no_skill_handoff_v1
    checks:
      - ref: explore_current_problem_first_v1
      - ref: explore_explain_late_sleep_oil_link_v1
      - ref: explore_no_repeated_photo_invite_v1
      - ref: explore_no_tool_sacralization_v1

  explore_tonight_routine_with_cabinet_v1:
    description: 用户不拍照，先问今晚怎么救急。
    editable_components: [main_agent, explore_journey, soul_style]
    expected_behavior: >
      接受用户不拍照，基于已有护肤柜产品给今晚分区方案：
      控油闭口区克制使用水杨酸，两颊用神经酰胺修护，避免叠太多功效。
    hard_assertions:
      - ref: explore_text_reply_no_background_task_v1
      - ref: explore_direct_reply_no_skill_handoff_v1
    checks:
      - ref: explore_uses_known_cabinet_products_v1
      - ref: explore_product_boundary_for_breakout_v1
      - ref: explore_no_repeated_photo_invite_v1
      - ref: explore_no_tool_sacralization_v1

  explore_niacinamide_followup_v1:
    description: 用户问护肤柜里的烟酰胺今天能不能用。
    editable_components: [main_agent, explore_journey, soul_style]
    expected_behavior: >
      直接回答烟酰胺今天是否适合叠加，并说明区域、频率和暂停条件；
      不把产品问题外包给肌肤日记或深度报告。
    hard_assertions:
      - ref: explore_text_reply_no_background_task_v1
      - ref: explore_direct_reply_no_skill_handoff_v1
    checks:
      - ref: explore_uses_known_cabinet_products_v1
      - ref: explore_product_boundary_for_breakout_v1
      - ref: explore_diary_mention_only_when_relevant_v1
      - ref: explore_no_tool_sacralization_v1
