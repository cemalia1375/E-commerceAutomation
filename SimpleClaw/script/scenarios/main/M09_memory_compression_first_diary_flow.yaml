id: M09_memory_compression_first_diary_flow
name: main_memory_compression_first_diary_flow
description: 从 GEPA scenario_novice_emotion_to_first_diary_v1 改写的主 runner 长轮次场景。前置覆盖用户从不会连接魔镜、连接失败到成功接入后的连续求助，再衔接强情绪陪伴、低压自拍、首次图片分析与肌肤日记、护肤品入柜、探索期护理方案跟进、第二天复拍，并通过长对话积压触发 context compression 和 memory_extract，观察 compression_memory.md 如何整理 dropped messages。
agent: main
initial_stage: novice
wait_side_effects_s: 1
session:
  reuse: false
  subscriptions:
    - "main:{tenant_key}"
    - "skin_diary:{tenant_key}"

