id: S04_skin_diary_handoff_minimal
name: stress_skin_diary_handoff_minimal
description: 最小肌肤日记 handoff 冒烟测试：不注入 seed/mock。先验证无图片分析时 handoff 被 readiness gate deferred；再上传真实自拍后不等待异步完成，继续痘痘咨询、护肤品调研、入柜承诺、肌肤日记刷新和后台完成观测链路。
agent: main
initial_stage: novice
wait_side_effects_s: 3
session:
  reuse: false
  subscriptions:
    - "main:{tenant_key}"
    - "skin_diary:{tenant_key}"

