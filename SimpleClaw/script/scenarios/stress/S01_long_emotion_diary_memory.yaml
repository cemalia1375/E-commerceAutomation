id: S01_long_emotion_diary_memory
name: stress_long_emotion_diary_memory
description: 鲁棒性压测主链路：强情绪陪伴、低压自拍、首次图片分析和肌肤日记、产品图干扰、护肤柜自动入柜、黑眼圈/痘痘追问、第二天肌肤日记刷新和 memory 压缩后召回。重点覆盖 first token、skill unload、historical image 不误取产品图、异步承诺和 memory continuity。
agent: main
initial_stage: novice
wait_side_effects_s: 1
session:
  reuse: false
  subscriptions:
    - "main:{tenant_key}"
    - "skin_diary:{tenant_key}"

turns:
  - user: "今天真的很烦，项目出了个 bug，明明不是我写的代码，老板非说是我的问题。"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
      - not_tool_called: analyze_image
      - not_tool_called: notify_skin_diary_chat
    soft_checks:
      - ttft_ms_lt: 2500

  - user: "我解释了他还说我推卸责任，我现在气到饭都不想吃。"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
      - not_tool_called: analyze_image
      - not_tool_called: notify_skin_diary_chat
    soft_checks:
      - ttft_ms_lt: 2500

  - user: "那我现在能做点什么？别太复杂，我只想把自己拉回来一点。"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    wait_side_effects_s: 2
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
      - no_runtime_task_created: image_analysis
    soft_checks:
      - doc_contains:
          doc: USER.md
          text: "复杂"

  - user: "我现在不太想拍照，我感觉脸色肯定很差。"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    wait_side_effects_s: 2
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
      - no_runtime_task_created: image_analysis
    soft_checks:
      - doc_contains:
          doc: SOUL.md
          text: "拍照"

  - user: "好吧，那我拍一张。"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
      - not_tool_called: analyze_image
      - no_runtime_task_created: image_analysis
    soft_checks:
      - reply_not_contains: "已经提交"

  - user: "我拍好了，你看看吧。"
    phase: measured
    measure: true
    media:
      - "https://mojing-photo-cat.tos-cn-guangzhou.volces.com/test-photos/user290_face_20260406.png"
    capture_prompt: true
    capture_prompt_chars: 50000
    wait_side_effects_s: 300
    wait_until_timeout_s: 300
    wait_until_interval_s: 2
    wait_until:
      - image_job_status:
          status: succeeded
      - user_md_contains: "## Learned Skin Profile"
      - runtime_task_created: skin_diary_generation
      - skin_diary_result_created: true
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
      - runtime_task_created: image_analysis
      - image_job_created: true
      - image_job_status:
          status: succeeded
      - user_md_contains: "## Learned Skin Profile"
      - runtime_task_created: skin_diary_generation
      - skin_diary_result_created: true

  - user: "[scenario_action] wait for main session image-analysis activation"
    phase: setup
    measure: false
    scenario_action:
      name: wait_for_session_events
      session_key: "main:{tenant_key}"
      use_existing_listener: true
      timeout_s: 60
      max_events: 64
      source: system_activation
      activation_kind: image_analysis_completion
    soft_checks:
      - session_event_contains: "image_analysis_completion"

  - user: "[scenario_action] wait for main session skin-diary completion activation"
    phase: setup
    measure: false
    scenario_action:
      name: wait_for_session_events
      session_key: "main:{tenant_key}"
      use_existing_listener: true
      timeout_s: 120
      max_events: 64
      source: system_activation
      activation_kind: skin_diary_completion
    soft_checks:
      - session_event_contains: "skin_diary_completion"

  - user: "真的吗？我还以为我今天脸黄得像个蜡人。"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
      - not_tool_called: analyze_image

  - user: "肌肤日记是什么？别搞成每天必须打卡那种，我今天已经够烦了。"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
      - not_tool_called: notify_skin_diary_chat
      - no_runtime_task_created: skin_diary_generation
    soft_checks:
      - reply_not_contains: "必须"

  - user: "那我现在就去护肤。"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true

  - user: "我现在有这个。"
    phase: measured
    measure: true
    media:
      - "https://mojing-photo-cat.tos-cn-guangzhou.volces.com/test-photos/20260512-172434.png"
    capture_prompt: true
    capture_prompt_chars: 50000
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
      - tool_called: load_skill
      - not_tool_called: lookup_skincare_cabinet_product_status
      - not_tool_called: research_skincare_product
      - not_tool_called: analyze_image
      - not_tool_called: notify_skin_diary_chat
      - not_tool_called: deep_report_chat
      - no_runtime_task_created: image_analysis
      - no_runtime_task_created: cabinet_product_research
      - no_runtime_task_created: skin_diary_generation

  - user: "对，就是这个，已经开封在用了。"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
      - tool_called: lookup_skincare_cabinet_product_status
      - not_tool_called: analyze_image
      - not_tool_called: research_skincare_product
      - not_tool_called: confirm_skincare_cabinet_record
      - no_runtime_task_created: cabinet_product_research

  - user: "可以帮我查一下资料呀，调研完直接帮我入柜吧。"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    wait_side_effects_s: 1
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
      - tool_called: research_skincare_product
      - runtime_task_created: cabinet_product_research
      - not_tool_called: analyze_image
      - not_tool_called: confirm_skincare_cabinet_record
      - no_runtime_task_created: image_analysis
      - no_runtime_task_created: skin_diary_generation
    soft_checks:
      - reply_contains: "入柜"

  - user: "[scenario_action] wait for cabinet product record"
    phase: setup
    measure: false
    scenario_action:
      name: wait_for_side_effects
    wait_side_effects_s: 1
    wait_until_timeout_s: 300
    wait_until_interval_s: 2
    wait_until:
      - runtime_task_created: cabinet_product_record
      - runtime_task_succeeded: cabinet_product_record
    hard_assertions:
      - reply_non_empty: true
      - runtime_task_created: cabinet_product_record
      - runtime_task_succeeded: cabinet_product_record

  - user: "额头上还有痘痘呢，今天还要继续刚才说的那个办法吗？"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    wait_side_effects_s: 2
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
      - not_tool_called: analyze_image
    soft_checks:
      - doc_contains:
          doc: USER.md
          text: "痘"

  - user: "还有黑眼圈，我今天真的最在意这个，痘痘烦归烦，但黑眼圈让我看起来特别没精神。"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    wait_side_effects_s: 2
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
      - reply_not_contains: "产品图"
      - reply_not_contains: "找不到你早上拍的肤况照"
    soft_checks:
      - doc_contains:
          doc: USER.md
          text: "黑眼圈"

  - user: "我最近也总是加班，基本十二点才睡，早上又赶着出门，晨间护肤最好三步以内。"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    wait_side_effects_s: 2
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
    soft_checks:
      - doc_contains:
          doc: USER.md
          text: "三步"

  - user: "饮食我也说实话，我爱吃火锅，越辣越好，奶茶和啤酒也喜欢。"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    wait_side_effects_s: 2
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
    soft_checks:
      - doc_contains:
          doc: USER.md
          text: "火锅"

  - user: "我不想完全戒辣，但可以先少喝一点奶茶，啤酒尽量周末再喝。"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    wait_side_effects_s: 2
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
    soft_checks:
      - doc_contains:
          doc: USER.md
          text: "奶茶"

  - user: "不错不错"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    wait_side_effects_s: 3
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
    soft_checks:
      - ttft_ms_lt: 2500

  - scenario_action:
      name: age_latest_image_job
      days: 1
    phase: setup
    measure: false
    hard_assertions:
      - reply_non_empty: true

  - user: "第二天了，给我来一份今日的护肤日记吧。"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    wait_side_effects_s: 1
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
      - no_runtime_task_created: image_analysis
      - no_runtime_task_created: subagent_dispatch
      - no_runtime_task_created: skin_diary_generation
      - reply_not_contains: "提交生成请求"
      - reply_not_contains: "查看生成进度"
    soft_checks:
      - reply_contains: "照片"
      - reply_contains: "自拍"

  - user: "我拍好了。"
    phase: measured
    measure: true
    media:
      - "https://mojing-photo-cat.tos-cn-guangzhou.volces.com/test-photos/user290_face_20260406.png"
    capture_prompt: true
    capture_prompt_chars: 50000
    wait_side_effects_s: 300
    wait_until_timeout_s: 300
    wait_until_interval_s: 2
    wait_until:
      - image_job_status:
          status: succeeded
          source: created
      - user_md_contains: "## Learned Skin Profile"
      - runtime_task_created: skin_diary_generation
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
      - runtime_task_created: image_analysis
      - image_job_created: true
      - image_job_status:
          status: succeeded
          source: created
      - runtime_task_created: skin_diary_generation

  - user: "你还记得我昨天说要怎么处理额头痘痘吗？我想知道今天要不要继续那个办法。"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    wait_side_effects_s: 4
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
      - reply_not_contains: "记不清"
      - reply_not_contains: "没找到"
    soft_checks:
      - runtime_task_created: memory_extract

  - user: "晨间护肤教我一下呢，最好还是三步以内。"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    wait_side_effects_s: 3
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
    soft_checks:
      - runtime_task_created: memory_extract

  - user: "如何判断我们现在的做法关于痘痘是有效的呢？"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    wait_side_effects_s: 5
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
    soft_checks:
      - runtime_task_created: memory_extract

  - user: "最后你帮我总结一下：我今天这张图片和昨天比有什么区别？"
    phase: measured
    measure: true
    capture_prompt: true
    capture_prompt_chars: 50000
    wait_side_effects_s: 8
    hard_assertions:
      - reply_non_empty: true
      - first_token_non_empty: true
      - main_reply_non_empty: true
      - reply_not_contains: "产品图"
    soft_checks:
      - runtime_task_created: memory_extract

  - user: "[scenario_action] wait for dream memory review"
    phase: setup
    measure: false
    scenario_action:
      name: wait_for_side_effects
    wait_side_effects_s: 600
    wait_until_timeout_s: 600
    wait_until_interval_s: 10
    wait_until:
      - runtime_task_created: dream
      - runtime_task_succeeded: dream
    hard_assertions:
      - reply_non_empty: true
    soft_checks:
      - runtime_task_created: dream
      - runtime_task_succeeded: dream
